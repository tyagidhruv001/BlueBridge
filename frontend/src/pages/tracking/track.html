<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Professional - Live GPS | BlueBridge</title>

    
    

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(30, 32, 58, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1001;
        }

        .header h1 {
            font-size: 1.2rem;
            flex: 1;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .status-badge.waiting {
            background: rgba(255, 206, 0, 0.2);
            color: #ffce00;
        }

        .status-badge.active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .pulse {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        #map {
            flex: 1;
            z-index: 1;
        }

        .info-card {
            position: absolute;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 32, 58, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            min-width: 320px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #00ff88;
            margin-bottom: 0.3rem;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .location-btn {
            background: linear-gradient(135deg, #00d2ff, #a855f7);
            color: #fff;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            transition: transform 0.2s;
        }

        .location-btn:hover {
            transform: scale(1.02);
        }

        .location-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            background: rgba(255, 59, 48, 0.2);
            border: 1px solid rgba(255, 59, 48, 0.5);
            color: #ff3b30;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 0.85rem;
        }

        .success-msg {
            background: rgba(0, 255, 136, 0.2);
            border: 1px solid rgba(0, 255, 136, 0.5);
            color: #00ff88;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 0.85rem;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1><i class="fas fa-route" style="color: #00d2ff;"></i> Track Professional</h1>
        <div class="status-badge waiting" id="status-badge">
            <span class="pulse"></span>
            <span id="status-text">Locating Professional...</span>
        </div>
    </div>

    <div id="map"></div>

    <div class="info-card">
        <h3 style="margin-bottom: 1rem; color: #00d2ff;">📍 Location Status</h3>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-value" id="distance">--</div>
                <div class="stat-label">Distance (km)</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="eta">--</div>
                <div class="stat-label">ETA (min)</div>
            </div>
        </div>

        <button class="location-btn" id="get-location-btn">
            <i class="fas fa-crosshairs"></i> Get My Location
        </button>

        <div id="message-area"></div>
    </div>

    

    
</body>

</html>
