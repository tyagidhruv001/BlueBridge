<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Location - Live GPS | BlueBridge</title>

    
    

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(30, 32, 58, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 1rem;
            z-index: 1001;
        }

        .header h1 {
            font-size: 1.2rem;
            flex: 1;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .toggle-label {
            font-size: 0.9rem;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #00ff88;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch.active::after {
            transform: translateX(30px);
        }

        #map {
            flex: 1;
            z-index: 1;
        }

        .info-card {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 32, 58, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 1.5rem;
            min-width: 320px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: #00d2ff;
            margin-bottom: 0.3rem;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .status-msg {
            text-align: center;
            padding: 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .status-active {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .status-inactive {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        .last-update {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>📱 Share Your Location</h1>
        <div class="toggle-container">
            <span class="toggle-label" id="toggle-label">Off</span>
            <div class="toggle-switch" id="location-toggle"></div>
        </div>
    </div>

    <div id="map"></div>

    <div class="info-card">
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-value" id="accuracy">--</div>
                <div class="stat-label">GPS Accuracy (m)</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="update-count">0</div>
                <div class="stat-label">Updates Sent</div>
            </div>
        </div>

        <div class="status-msg status-inactive" id="status-msg">
            Tap toggle to start sharing your location
        </div>

        <div class="last-update" id="last-update">
            Ready to share
        </div>
    </div>

    

    
</body>

</html>
